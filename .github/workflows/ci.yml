name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      debug_logs:
        description: 'Enable verbose test logs (no LOG_LEVEL suppression)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.debug_logs }}" = "true" ]; then
            echo "Running tests with verbose logs"
            CI=true npx vitest run --maxWorkers=1 --reporter=verbose
          else
            echo "Running tests with quiet logs"
            LOG_LEVEL=fatal CI=true npx vitest run --maxWorkers=1
          fi
