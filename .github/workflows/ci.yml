name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      debug_logs:
        description: 'Enable verbose test logs (no LOG_LEVEL suppression)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg16-trixie
        env:
          POSTGRES_DB: gantry_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gantry_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
      - run: npm ci

      - name: Bootstrap Postgres test DB
        run: |
          docker exec ${{ job.services.postgres.id }} psql -U postgres -d gantry_test -v ON_ERROR_STOP=1 \
            -c 'CREATE EXTENSION IF NOT EXISTS vector;' \
            -c 'CREATE EXTENSION IF NOT EXISTS pg_trgm;'

      - name: Supply-chain audit
        run: npm run security:audit

      - name: Generate runtime SBOM
        run: npm run --silent security:sbom > gantry-runtime-sbom.cdx.json

      - name: Upload runtime SBOM
        uses: actions/upload-artifact@v4
        with:
          name: gantry-runtime-sbom
          path: gantry-runtime-sbom.cdx.json

      - name: Build runtime image
        run: docker compose -f ops/docker/docker-compose.fleet.yml build --pull

      - name: Check runtime images
        run: npm run security:images -- --inspect-compose-images --require-content-inspection

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check package contents
        run: npm run security:package

      - name: Tests
        id: tests
        run: |
          set -o pipefail
          : > /tmp/vitest.log

          run_check() {
            echo "Running $*" | tee -a /tmp/vitest.log
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.debug_logs }}" = "true" ]; then
              timeout 900s env CI=true "$@" 2>&1 | tee -a /tmp/vitest.log
            else
              timeout 900s env LOG_LEVEL=fatal CI=true "$@" 2>&1 | tee -a /tmp/vitest.log
            fi
            status=${PIPESTATUS[0]}
            if [ "$status" -eq 124 ]; then
              echo "::error::$* timed out after 900 seconds"
              exit 124
            fi
            if [ "$status" -ne 0 ]; then
              exit "$status"
            fi
          }

          run_check npm test
          run_check npm run test:e2e
          export GANTRY_TEST_DATABASE_URL=postgres://postgres:postgres@localhost:${{ job.services.postgres.ports[5432] }}/gantry_test
          run_check npm run test:e2e:postgres

      - name: Debug CI Hang Context
        if: ${{ always() && steps.tests.outcome != 'success' }}
        run: |
          {
            echo "=== Date ==="
            date -u
            echo
            echo "=== Process Snapshot ==="
            ps -eo pid,ppid,etime,stat,cmd | grep -E 'vitest|node|npm' | grep -v grep || true
            echo
            echo "=== Open Files for Node Processes ==="
            pgrep -f 'node|vitest|npm' | while read -r pid; do
              echo "--- PID $pid ---"
              lsof -p "$pid" | head -n 120 || true
            done
            echo
            echo "=== Last 300 lines of /tmp/vitest.log ==="
            tail -n 300 /tmp/vitest.log || true
          } | tee /tmp/ci-debug.txt

      - name: Upload CI Debug Artifacts
        if: ${{ always() && steps.tests.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-debug-logs
          path: |
            /tmp/vitest.log
            /tmp/ci-debug.txt
          if-no-files-found: ignore
