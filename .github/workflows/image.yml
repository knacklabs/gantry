name: Image

# Build, SBOM, and vulnerability-scan the runtime image on every PR; additionally
# push to GHCR on main and tags. PRs build + scan only (no registry writes).
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'ops/docker/**'
      - 'apps/core/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/image.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write # push to GHCR (main/tags only; guarded per-step)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Push only on main/tags. PRs from forks cannot write packages anyway.
      - name: Resolve push policy
        id: policy
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.policy.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      # Build once and load locally so SBOM + scan run against the exact image.
      # The registry push (main/tags) is a separate step from the same context.
      - name: Build image (load)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/docker/Dockerfile
          load: true
          tags: gantry-runtime:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: gantry-runtime:scan
          format: cyclonedx-json
          output-file: gantry-image-sbom.cdx.json
          artifact-name: gantry-image-sbom

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gantry-runtime:scan
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Push image (main/tags only)
        if: steps.policy.outputs.push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
