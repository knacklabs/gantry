services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-trixie@sha256:eef42748a134417905134d89e93e144873ff73910ddea2058357740e07a9b01a
    container_name: gantry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gantry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      GANTRY_DB_USER: gantry_app
      GANTRY_DB_PASSWORD: ${GANTRY_DB_PASSWORD:-gantry_app_password}
      GANTRY_SCHEMA: gantry
      PGBOSS_SCHEMA: pgboss
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - ${GANTRY_POSTGRES_DATA:-${HOME}/gantry/postgres}:/var/lib/postgresql/data
      - ./ops/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d gantry']
      interval: 2s
      timeout: 3s
      retries: 30
