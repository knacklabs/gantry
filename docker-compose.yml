services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-trixie@sha256:fce8fb583b92ef8af5150b373a96415d46a8cd38ba09b38efeea17c8b4c7d782
    container_name: gantry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gantry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      GANTRY_DB_USER: gantry_app
      GANTRY_DB_PASSWORD: ${GANTRY_DB_PASSWORD:-gantry_app_password}
      GANTRY_SCHEMA: gantry
      PGBOSS_SCHEMA: pgboss
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - ${GANTRY_POSTGRES_DATA:-${HOME}/gantry/postgres}:/var/lib/postgresql/data
      - ./ops/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d gantry']
      interval: 2s
      timeout: 3s
      retries: 30
