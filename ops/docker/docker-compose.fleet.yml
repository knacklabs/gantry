# Local fleet rehearsal — exercises the role-differentiated fleet topology on one
# machine:
#   Postgres (same extension/role bootstrap as the root compose)
#   + MinIO (S3-compatible artifact store)
#   + one control process, N live-workers, and N job-workers, all from the same
#   built runtime image, differentiated only by GANTRY_PROCESS_ROLE, and
#   health-checked on /readyz.
#
# One image, many roles (deployment-owned env GANTRY_PROCESS_ROLE):
#   control      full admin/settings API + channels outbound-only; runs no live
#                or job execution, no bakes; does NOT register as a worker.
#   live-worker  live admission/execution + provider inbound + chat delivery;
#                ops-only API (healthz/readyz/metrics + read-only status/health/
#                doctor; admin routes 404); no scheduler, no bakes.
#   job-worker   scheduler + bakes + job-notification delivery; channels
#                outbound-only; ops-only API; no live admission.
# Live execution is horizontally distributed: every live-worker polls messages
# and admits live turns; max_message_runs is per-live-worker capacity, so adding
# live-workers adds chat capacity linearly. See
# docs/architecture/live-horizontal-execution.md.
#
# This is NOT the workstation compose. The root docker-compose.yml (Postgres
# only, for local dev) is unchanged. Run this from the repo root:
#
#   docker compose -f ops/docker/docker-compose.fleet.yml up --build
#
#   # Scale the worker roles independently (the rehearsal command):
#   docker compose -f ops/docker/docker-compose.fleet.yml up --build \
#     --scale live-worker=3 --scale job-worker=2
#
# Migrations run from ONE service by design (control, see GANTRY_SKIP_MIGRATIONS
# below). The settings-seed one-shot migrates the schema first; the entrypoint
# advisory lock makes concurrent migration safe regardless, so this is a
# deliberate "single explicit migrator" choice, not a correctness requirement.
#
# Only control publishes a host port (admin/API). Worker replicas take no host
# port (they would collide under --scale) and are reachable on the internal
# network or via `docker compose ... exec`. See
# docs/deployment/aws-terraform.md (Local Fleet Rehearsal) for the walkthrough.

name: gantry-fleet

x-worker-base: &worker-base
  build:
    context: ../..
    dockerfile: ops/docker/Dockerfile
  image: gantry-runtime:fleet-rehearsal
  restart: unless-stopped
  # sandbox_runtime uses Linux namespaces through bubblewrap inside the
  # container; Docker's default seccomp profile may block namespace creation.
  security_opt:
    - seccomp=unconfined
  depends_on:
    postgres:
      condition: service_healthy
    minio-bootstrap:
      condition: service_completed_successfully
    # All roles only boot after desired state is seeded: the seed service writes
    # a fleet-marked settings.yaml into the shared gantry-home volume and appends
    # revision 1, so /readyz can go green (ADR-3 fleet boot).
    settings-seed:
      condition: service_completed_successfully
  # Shared runtime home: the seed writes settings.yaml here (declaring
  # runtime.deployment_mode: fleet) and every process reads it.
  volumes:
    - gantry-fleet-home:/var/lib/gantry
  environment: &worker-env
    NODE_ENV: production
    # Security posture (production|remote). Fleet topology requires production
    # posture; the fleet/workstation topology itself is the runtime.deployment_mode
    # settings key, seeded into desired state (see the seed step below), not an
    # env var. The process role is GANTRY_PROCESS_ROLE, set per service below.
    GANTRY_SECURITY_POSTURE: production
    # Runtime DB role (runtime URL). The migration role can differ via
    # MIGRATION_DATABASE_URL; here we use one role for rehearsal simplicity.
    GANTRY_DATABASE_URL: >-
      postgres://gantry_app:${GANTRY_DB_PASSWORD:-gantry_app_password}@postgres:5432/gantry
    GANTRY_DB_SCHEMA: gantry
    GANTRY_CONTROL_HOST: 0.0.0.0
    GANTRY_CONTROL_PORT: '8080'
    # Local rehearsal only: generate/load one shared secret set from the shared
    # gantry-home volume when the operator did not supply real env vars.
    # Production leaves this unset and injects values via Secrets Manager refs
    # (see Terraform modules/secrets).
    GANTRY_FLEET_REHEARSAL_AUTO_SECRETS: ${GANTRY_FLEET_REHEARSAL_AUTO_SECRETS:-1}
    SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-}
    GANTRY_IPC_AUTH_SECRET: ${GANTRY_IPC_AUTH_SECRET:-}
    GANTRY_CONTROL_API_KEYS_JSON: ${GANTRY_CONTROL_API_KEYS_JSON:-}
    # Artifact store credentials are NOT settings: they resolve through the AWS
    # SDK default credential chain. For local fleet rehearsal these point at
    # MinIO. The driver itself (runtime.artifact_store.driver=s3, bucket,
    # endpoint=http://minio:9000, force_path_style=true) is seeded into desired
    # state — see docs/deployment/aws-terraform.md (Local Fleet Rehearsal).
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-gantry_minio}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-gantry_minio_password}
    AWS_REGION: ${GANTRY_ARTIFACT_S3_REGION:-us-east-1}
    # One explicit migrator: control migrates (GANTRY_SKIP_MIGRATIONS=0); the
    # worker roles skip the explicit pass and override this to '1' below. The
    # runtime boot-time migrate() still takes the same advisory lock on every
    # role, so this only avoids redundant explicit passes — it is never a
    # correctness dependency.
    GANTRY_SKIP_MIGRATIONS: '1'
  healthcheck:
    # Readiness gates traffic: 503 while migrations/settings load or while draining.
    test:
      [
        'CMD',
        'node',
        '-e',
        "fetch('http://127.0.0.1:8080/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
      ]
    interval: 5s
    timeout: 3s
    retries: 30
    start_period: 60s
  # Graceful drain: give SIGTERM time to drain live turns before SIGKILL.
  stop_grace_period: 130s

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-trixie@sha256:fce8fb583b92ef8af5150b373a96415d46a8cd38ba09b38efeea17c8b4c7d782
    container_name: gantry-fleet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gantry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      GANTRY_DB_USER: gantry_app
      GANTRY_DB_PASSWORD: ${GANTRY_DB_PASSWORD:-gantry_app_password}
      GANTRY_SCHEMA: gantry
      PGBOSS_SCHEMA: pgboss
    volumes:
      # Reuse the root extension/role bootstrap (vector + pg_trgm + roles).
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
      # Ephemeral rehearsal data (named volume, not the developer's ~/gantry).
      - gantry-fleet-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d gantry']
      interval: 2s
      timeout: 3s
      retries: 30

  # S3-compatible artifact store for local fleet rehearsal. Production uses real
  # S3 with split IAM (bake:rw, worker:ro); here one root credential is enough.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    container_name: gantry-fleet-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-gantry_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-gantry_minio_password}
    volumes:
      # Ephemeral rehearsal data (named volume, not the developer's ~/gantry).
      - gantry-fleet-minio-data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mc ready local 2>/dev/null || curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  # One-shot bucket bootstrap: create the artifact bucket, then exit. All roles
  # wait on service_completed_successfully before booting.
  minio-bootstrap:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
    container_name: gantry-fleet-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set local http://minio:9000
        "${MINIO_ROOT_USER:-gantry_minio}" "${MINIO_ROOT_PASSWORD:-gantry_minio_password}"
        && mc mb --ignore-existing "local/${GANTRY_ARTIFACT_S3_BUCKET:-gantry-artifacts}"

  # One-shot desired-state seed. Writes a fleet-marked settings.yaml into the
  # shared gantry-home volume, migrates the schema, then appends revision 1 via
  # `gantry settings import --fleet`. All roles wait on this completing so
  # /readyz can go green. This is the one service that always migrates (it must,
  # to import settings into a migrated schema). Replace the heredoc settings.yaml
  # with your real desired state (agents, providers, conversations) before a real
  # deployment.
  settings-seed:
    <<: *worker-base
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true
    volumes:
      - gantry-fleet-home:/var/lib/gantry
    entrypoint:
      - /bin/sh
      - -c
      - |-
        set -e;
        mkdir -p /var/lib/gantry;
        printf '%s\n' \
          'runtime:' \
          '  deployment_mode: fleet' \
          '  sandbox:' \
          '    provider: sandbox_runtime' \
          '  artifact_store:' \
          '    driver: s3' \
          "    bucket: ${GANTRY_ARTIFACT_S3_BUCKET:-gantry-artifacts}" \
          '    endpoint: http://minio:9000' \
          "    region: ${GANTRY_ARTIFACT_S3_REGION:-us-east-1}" \
          '    force_path_style: true' \
          'storage:' \
          '  postgres:' \
          '    url_env: GANTRY_DATABASE_URL' \
          '    schema: gantry' \
          > /var/lib/gantry/settings.yaml;
        node /app/ops/docker/migrate.mjs;
        node /app/dist/cli/index.js settings import --file /var/lib/gantry/settings.yaml --fleet

  # Control plane: full admin/settings API. Channels connect outbound-only; it
  # runs no live or job execution and no bakes, and does not register as a worker
  # instance. This is the single service whose control port is published for
  # admin/API access during rehearsal, and the single explicit migrator
  # (GANTRY_SKIP_MIGRATIONS=0). It depends on settings-seed (which already
  # migrated), so its explicit pass is an idempotent, lock-safe no-op — a
  # deliberate "one owner" choice. Not scaled (one control plane).
  control:
    <<: *worker-base
    environment:
      <<: *worker-env
      GANTRY_PROCESS_ROLE: control
      GANTRY_SKIP_MIGRATIONS: '0'
    ports:
      - '127.0.0.1:8080:8080'

  # Live workers: live admission/execution + provider inbound + chat delivery.
  # Ops-only API (admin routes 404). Live execution is horizontally distributed
  # — every live-worker polls messages and admits live turns; per-worker slot
  # capacity is runtime.queue.max_message_runs, so chat capacity scales with the
  # replica count. Scale with --scale live-worker=N (no host port: replicas would
  # collide; reach them on the internal network or via `docker compose exec`).
  live-worker:
    <<: *worker-base
    environment:
      <<: *worker-env
      GANTRY_PROCESS_ROLE: live-worker

  # Job workers: scheduler + bakes + job-notification delivery. Channels connect
  # outbound-only; ops-only API; no live admission. Jobs are claimable by any
  # job-worker (run-lease + fencing), so this scales horizontally for job/bake
  # throughput. Scale with --scale job-worker=N (no host port, same reason as
  # live-worker).
  job-worker:
    <<: *worker-base
    environment:
      <<: *worker-env
      GANTRY_PROCESS_ROLE: job-worker

volumes:
  gantry-fleet-pgdata:
  gantry-fleet-minio-data:
  gantry-fleet-home:
